name: Apply release transfer

on:
  push:
    branches:
      - codex/release-v12.4.0

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply verified release patch
        shell: bash
        run: |
          cat <<'PATCH' | base64 --decode | gzip --decompress > /tmp/release.patch
          
          PATCH
          git apply --3way --whitespace=nowarn /tmp/release.patch
          node scripts/generate-pwa-icons.js
          rm /tmp/release.patch
          rm .github/workflows/apply-release-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Add reproducible PWA and browser test coverage"
          git push origin HEAD:refs/heads/codex/release-v12.4.0
