name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax check
        run: |
          node --check app.js
          node --check validate.js
          node --check sw.js
          node --check version.js
          node --check storage.js
          node --check progress.js
          node --check coach.js
          node --check verify-release.js
          node --test progress.test.js
          node --test storage.test.js
          node --test coach.test.js
          node --test coach-flow.integration.test.js
          node --test app-shell.integration.test.js
      - name: JSON validation
        run: node validate.js
      - name: Release integrity check
        run: node verify-release.js
  e2e:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install browser tests
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser E2E
        run: npm run test:e2e
