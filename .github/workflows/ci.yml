name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax check
        run: |
          node --check app.js
          node --check validate.js
          node --check sw.js
      - name: JSON validation
        run: node validate.js
      - name: Version sync check
        run: |
          APP_VER=$(grep -oP "APP_VERSION\s*=\s*'\K[^']+" app.js)
          SW_VER=$(grep -oP "CACHE_NAME\s*=\s*'\K[^']+" sw.js)
          HTML_VER=$(grep -oP "app\.js\?v=\K[0-9]+" index.html)
          echo "app.js: APP_VERSION=$APP_VER"
          echo "sw.js: CACHE_NAME=$SW_VER"
          echo "index.html: v=$HTML_VER"
          if [ "$HTML_VER" != "${APP_VER%%.*}" ]; then echo "VERSION MISMATCH"; exit 1; fi
          echo "Versions synced OK"
